version: '3.8'

services:
  limpora-client:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "5173:5173"
    volumes:
      # Montar el código fuente para hot reload
      - ./src:/app/src
      - ./public:/app/public
      - ./index.html:/app/index.html
      - ./vite.config.js:/app/vite.config.js
      - ./package.json:/app/package.json
      # Usar volumen para node_modules (evita conflictos)
      - /app/node_modules
    environment:
      - NODE_ENV=development
    stdin_open: true
    tty: true