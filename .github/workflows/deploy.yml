name: Deploy Develop 

on:
  push:
    branches:
      - develop

jobs:
  dev-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Clean target folder
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 2222
          script: |
            rm -rf /var/www/html/ProyectoDaw2/*

      - name: Copy repo to VPS
        uses: appleboy/scp-action@v0.1.5
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 2222
          source: "./"
          target: "/var/www/html/ProyectoDaw2"

      - name: Create .env files and deploy
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 2222
          script: |
            cd /var/www/html/ProyectoDaw2
            
            # Remove override file if exists
            rm -f docker-compose.override.yml
            
            # Create .env for limpora-server
            cat > limpora-server/.env << 'ENVEOF'
            NODE_ENV=production
            API_PREFIX=${{ vars.API_PREFIX }}
            API_VERSION=${{ vars.API_VERSION }}
            PORT=${{ vars.PORT }}

            DB_NAME=${{ vars.DB_NAME }}
            DB_USER=${{ secrets.DB_USER }}
            DB_HOST=mysql
            DB_PASS=${{ secrets.DB_PASS }}
            DB_CONNECTION_LIMIT=${{ vars.DB_CONNECTION_LIMIT }}

            LOG_LEVEL=info
            LOG_FILE_PATH=./logs/app.log

            GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
            GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}
            GOOGLE_REDIRECT_URI=${{ secrets.GOOGLE_REDIRECT_URI }}
            
            FIREBASE_API_KEY=${{ secrets.FIREBASE_API_KEY }}

            RESEND_KEY=${{ secrets.RESEND_KEY }}
            RESEND_EMAIL_FROM=${{ vars.RESEND_EMAIL_FROM }}
            ENVEOF
            
            # Create .env in root for docker-compose
            cat > .env << 'ENVEOF'
            DB_PASS=${{ secrets.DB_PASS }}
            DB_NAME=${{ vars.DB_NAME }}
            ENVEOF
            
            # Verify files (hide sensitive data)
            echo "=== .env files created ==="
            ls -la .env limpora-server/.env
            
            echo "=== limpora-server/.env (first 5 lines, secrets hidden) ==="
            head -n 5 limpora-server/.env | sed 's/=.*/=***/'
            
            # Deploy
            docker compose down
            docker compose build
            docker compose up -d
            
            # Wait
            sleep 15
            
            # Status
            echo "=== Container Status ==="
            docker compose ps
            
            echo "=== Server Logs ==="
            docker compose logs --tail=100 limpora-server
            
            echo "=== MySQL Logs ==="
            docker compose logs --tail=50 mysql