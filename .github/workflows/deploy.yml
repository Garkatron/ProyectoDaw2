name: Deploy Develop 

on:
  push:
    branches:
      - develop

jobs:
  dev-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          passphrase: ${{ secrets.VPS_SSH_PASSPHRASE }}
          port: 2222
          script: |
            cd /var/www/html/ProyectoDaw2
            
            git reset --hard
            git clean -fdx
            git pull origin develop
            
            rm -f docker-compose.override.yml
            
            # Create .env for limpora-server
            cat > apps/server/.env << 'ENVEOF'
            NODE_ENV=production
            PORT=${{ vars.PORT }}
            DB_CONNECTION_LIMIT=${{ vars.DB_CONNECTION_LIMIT }}

            FIREBASE_PROJECT_ID=${{ secrets.FIREBASE_PROJECT_ID }}
            FIREBASE_CLIENT_EMAIL=${{ secrets.FIREBASE_CLIENT_EMAIL }}
            FIREBASE_PRIVATE_KEY=${{ secrets.FIREBASE_PRIVATE_KEY }}
            FIREBASE_API_KEY=${{ secrets.FIREBASE_API_KEY }}

            GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
            GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}
            GOOGLE_REDIRECT_URI=${{ vars.GOOGLE_REDIRECT_URI }}

            RESEND_KEY=${{ secrets.RESEND_KEY }}
            RESEND_AUTH_EMAIL=${{ vars.RESEND_AUTH_EMAIL }}
            RESEND_NOTIFICATION_EMAIL=${{ vars.RESEND_NOTIFICATION_EMAIL }}

            EMAIL_VERIFICATION=${{ vars.EMAIL_VERIFICATION }}

            IMAGEKIT_PRIVATE_KEY=${{ secrets.IMAGEKIT_PRIVATE_KEY }}
            IMAGEKIT_PUBLIC_KEY=${{ secrets.IMAGEKIT_PUBLIC_KEY }}
            IMAGEKIT_URL_ENDPOINT=${{ vars.IMAGEKIT_URL_ENDPOINT }}
            ENVEOF
            
            echo "=== .env created ==="
            ls -la apps/server/.env
            echo "=== apps/server/.env (keys only) ==="
            head -n 5 apps/server/.env | sed 's/=.*/=***/'
            
            docker compose down
            docker compose build --no-cache client
            docker compose build server
            docker compose up -d
            
            sleep 10
            
            echo "=== Container Status ==="
            docker compose ps