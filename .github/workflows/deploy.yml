name: Deploy Develop 

on:
  push:
    branches:
      - develop

jobs:
  dev-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Clean target folder
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 2222
          script: |
            rm -rf /var/www/html/ProyectoDaw2/*

      - name: Copy repo to VPS
        uses: appleboy/scp-action@v0.1.5
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 2222
          source: "./"
          target: "/var/www/html/ProyectoDaw2"

      - name: SSH and deploy Docker
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 2222
          envs: API_PREFIX,API_VERSION,PORT,DB_NAME,DB_PASS,DB_CONNECTION_LIMIT,GOOGLE_CLIENT_ID,GOOGLE_CLIENT_SECRET,GOOGLE_REDIRECT_URI,FIREBASE_API_KEY,RESEND_KEY,RESEND_EMAIL_FROM
          script: |
            cd /var/www/html/ProyectoDaw2
            
            # Create .env file for limpora-server
            cat > limpora-server/.env <<'EOF'
            NODE_ENV=production
            API_PREFIX=${API_PREFIX}
            API_VERSION=${API_VERSION}
            PORT=${PORT}

            DB_NAME=${DB_NAME}
            DB_HOST=mysql
            DB_PASS=${DB_PASS}
            DB_CONNECTION_LIMIT=${DB_CONNECTION_LIMIT}

            LOG_LEVEL=info
            LOG_FILE_PATH=./

            GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
            GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
            GOOGLE_REDIRECT_URI=${GOOGLE_REDIRECT_URI}
            
            FIREBASE_API_KEY=${FIREBASE_API_KEY}

            RESEND_KEY=${RESEND_KEY}
            RESEND_EMAIL_FROM=${RESEND_EMAIL_FROM}
            EOF

            # Create .env file for docker-compose (variables for mysql)
            cat > .env <<'EOF'
            DB_PASS=${DB_PASS}
            DB_NAME=${DB_NAME}
            EOF

            # Stop existing containers
            docker compose down

            # Remove old images to force rebuild
            docker compose build --no-cache

            # Start containers
            docker compose up -d

            # Wait for services to be healthy
            sleep 10

            # Show status
            echo "=== Container Status ==="
            docker compose ps
            
            echo "=== Server Logs (last 50 lines) ==="
            docker compose logs --tail=50 limpora-server
        env:
          API_PREFIX: ${{ vars.API_PREFIX }}
          API_VERSION: ${{ vars.API_VERSION }}
          PORT: ${{ vars.PORT }}
          DB_NAME: ${{ vars.DB_NAME }}
          DB_PASS: ${{ secrets.DB_PASS }}
          DB_CONNECTION_LIMIT: ${{ vars.DB_CONNECTION_LIMIT }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REDIRECT_URI: ${{ secrets.GOOGLE_REDIRECT_URI }}
          FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
          RESEND_KEY: ${{ secrets.RESEND_KEY }}
          RESEND_EMAIL_FROM: ${{ vars.RESEND_EMAIL_FROM }}