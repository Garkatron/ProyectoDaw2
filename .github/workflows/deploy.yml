name: Deploy Production

on:
  push:
    branches:
      - main

jobs:
  deploy-client:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy client via SSH
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          script: |
            cd /var/www/html/ProyectoDaw2
            git reset --hard
            git clean -fd
            git pull origin main

            cat > apps/client/.env << 'ENVEOF'
            VITE_STRIPE_PUBLIC_KEY="${{ secrets.STRIPE_FRONTEND_KEY }}"
            VITE_API_URL="https://api.limpora.xyz"
            VITE_TURNSTILE_SITE_KEY="{{ secrets.VITE_TURNSTILE_SITE_KEY }}"
            ENVEOF

            docker compose stop limpora-client
            docker compose rm -f limpora-client
            docker image prune -f
            docker compose build limpora-client
            docker compose up -d limpora-client
  deploy-server:
    runs-on: ubuntu-latest
    needs: deploy-client
    steps:
      - name: Deploy server via SSH
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          script: |
            cd /var/www/html/ProyectoDaw2

            cat > apps/server/.env << 'ENVEOF'
            NODE_ENV                    = "production"
            PORT                        = "${{ vars.PORT }}"
            FRONTEND_URL                = "https://www.limpora.xyz"
            EMAIL_VERIFICATION          = "${{ vars.EMAIL_VERIFICATION }}"
            DB_CONNECTION_LIMIT         = "${{ vars.DB_CONNECTION_LIMIT }}"

            # ? FIREBASE
            FIREBASE_PROJECT_ID         = "${{ secrets.FIREBASE_PROJECT_ID }}"
            FIREBASE_CLIENT_EMAIL       = "${{ secrets.FIREBASE_CLIENT_EMAIL }}"
            FIREBASE_PRIVATE_KEY        = "${{ secrets.FIREBASE_PRIVATE_KEY }}"
            FIREBASE_API_KEY            = "${{ secrets.FIREBASE_API_KEY }}"

            # ? Google
            GOOGLE_CLIENT_ID            = "${{ secrets.GOOGLE_CLIENT_ID }}"
            GOOGLE_CLIENT_SECRET        = "${{ secrets.GOOGLE_CLIENT_SECRET }}"
            GOOGLE_REDIRECT_URI         = "${{ vars.GOOGLE_REDIRECT_URI }}"

            # ? Resend
            RESEND_KEY                  = "${{ secrets.RESEND_KEY }}"
            RESEND_AUTH_EMAIL           = "${{ vars.RESEND_AUTH_EMAIL }}"
            RESEND_NOTIFICATION_EMAIL   = "${{ vars.RESEND_NOTIFICATION_EMAIL }}"

            # ? Imagekit
            IMAGEKIT_PRIVATE_KEY        = "${{ secrets.IMAGEKIT_PRIVATE_KEY }}"
            IMAGEKIT_PUBLIC_KEY         = "${{ secrets.IMAGEKIT_PUBLIC_KEY }}"
            IMAGEKIT_URL_ENDPOINT       = "${{ vars.IMAGEKIT_URL_ENDPOINT }}"

            # ? Stripe
            STRIPE_KEY                  = "${{ secrets.STRIPE_KEY }}"

            # ? Captcha
            TURNSTILE_SECRET_KEY        = "${{ secrets.TURNSTILE_SECRET_KEY }}"

            # ? Database (old)
            # DB_NAME                   = limpora
            # DB_USER                   = root
            # DB_HOST                   = mysql
            # DB_PASS                   = 123456
            # DB_CONNECTION_LIMIT       = 10
            ENVEOF

            docker compose stop limpora-server
            docker compose rm -f limpora-server
            docker image prune -f
            docker compose build limpora-server
            docker compose up -d limpora-server