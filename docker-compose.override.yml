version: "3.9"

services:
  limpora-client:
    build:
      context: ./limpora-client
      dockerfile: Dockerfile.dev   
    volumes:
      - ./limpora-client:/app     
      - /app/node_modules
    environment:
      NODE_ENV: development
      CHOKIDAR_USEPOLLING: "true"
      CHOKIDAR_INTERVAL: "500"

  limpora-server:
    build:
      context: ./limpora-server
      dockerfile: Dockerfile.dev  
    volumes:
      - ./limpora-server:/app:Z   
      - node_modules:/app/node_modules
    environment:
      NODE_ENV: development
      CHOKIDAR_USEPOLLING: "true"
      CHOKIDAR_INTERVAL: "500"
