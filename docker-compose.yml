services:
  limpora-client:
    build:
      context: .
      dockerfile: ./infra/docker/client.prod.Dockerfile
    ports:
      - "127.0.0.1:3002:3000"
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    networks:
      - limpora-network

  limpora-server:
    build:
      context: .
      dockerfile: ./infra/docker/server.prod.Dockerfile
    ports:
      - "127.0.0.1:3001:3000"
    env_file:
      - ./apps/server/.env
    environment:
      - NODE_ENV=production
      - FRONTEND_URL=https://www.limpora.xyz
    volumes:
      - .:/usr/src/app
      - /usr/src/app/node_modules
      - /usr/src/app/apps/server/node_modules
      - /usr/src/app/packages/common/node_modules
      - ./apps/server/data:/usr/src/app/apps/server/data

    restart: unless-stopped
    networks:
      - limpora-network

networks:
  limpora-network:
    name: limpora-network
    driver: bridge