services:
  limpora-client:
    build:
      context: .
      dockerfile: ./infra/docker/client.prod.Dockerfile

    env_file:
        - apps/client/.env
    ports:
      - "127.0.0.1:3002:80"
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    networks:
      - limpora-network

  loki:
    image: grafana/loki:latest
    ports:
          - "3100:3100"
    networks:
      - limpora-network


  limpora-server:
    build:
      context: .
      dockerfile: ./infra/docker/server.prod.Dockerfile
    dns:
      - 8.8.8.8
      - 8.8.4.4
    ports:
      - "127.0.0.1:3001:3000"
    env_file:
      - apps/server/.env
    environment:
      - NODE_ENV=production
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    volumes:
      - ./apps/server/data:/usr/src/app/data
    restart: unless-stopped
    networks:
      - limpora-network
    depends_on:
      - redis
      - loki


  grafana:
    image: grafana/grafana:latest
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=false
    networks:
      - limpora-network

  redis:
    image: redis:7-alpine
    env_file:
      - apps/server/.env
    ports:
      - "127.0.0.1:6379:6379"
    restart: unless-stopped
    networks:
      - limpora-network
    entrypoint: ["sh", "-c", "redis-server --requirepass $$REDIS_PASSWORD"]
    environment:
      - NODE_ENV=production
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}

    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      
networks:
  limpora-network:
    name: limpora-network
    driver: bridge