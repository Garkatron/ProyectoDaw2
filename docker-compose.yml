services:
  limpora-client:
    build:
      context: ./limpora-client
      dockerfile: Dockerfile.dev
    ports:
      - "5173:5173"
    volumes:
      - ./limpora-client:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - CHOKIDAR_USEPOLLING=true
      - CHOKIDAR_INTERVAL=500
    stdin_open: true
    tty: true
    networks:
      - limpora-network

  limpora-server:
    env_file:
      - ./limpora-server/.env
    build:
      context: ./limpora-server
      dockerfile: Dockerfile.dev
    ports:
      - "3001:3000"
    volumes:
      - ./limpora-server:/app:Z
      - node_modules:/app/node_modules
    environment:
      - NODE_ENV=development
      - CHOKIDAR_USEPOLLING=true
      - CHOKIDAR_INTERVAL=500
    depends_on:
      mysql:
        condition: service_healthy
    stdin_open: true
    tty: true
    networks:
      - limpora-network

  mysql:
    image: mysql:8
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: limpora
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./limpora-server/src/dbscripts:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - limpora-network

volumes:
  mysql_data:
  node_modules:

networks:
  limpora-network:
    name: limpora-network
    driver: bridge