version: "3.9"

services:
  limpora-client:
    build:
      context: ./limpora-client
      dockerfile: Dockerfile.prod
    ports:
      - "5173:5173"
    environment:
      NODE_ENV: production
    restart: unless-stopped
    networks:
      - limpora-network

  limpora-server:
    build:
      context: ./limpora-server
      dockerfile: Dockerfile.prod
    ports:
      - "3001:3000"
    env_file:
      - ./limpora-server/.env
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - limpora-network

  mysql:
    image: mysql:8
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASS}
      MYSQL_DATABASE: ${DB_NAME}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./limpora-server/src/dbscripts:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - limpora-network

volumes:
  mysql_data:

networks:
  limpora-network:
    name: limpora-network
    driver: bridge